<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YT Viewer</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="YT Viewer" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #272727;
      --text: #ffffff;
      --text2: #aaaaaa;
      --accent: #ff0000;
      --border: #303030;
      --header-h: 56px;
      --tab-h: 56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font-xs: 10px;
      --font-sm: 12px;
      --font-base: 14px;
      --font-md: 15px;
      --font-lg: 16px;
      --font-xl: 19px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    #header {
      flex-shrink: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding-top: var(--safe-top);
      z-index: 200;
    }
    #header-inner {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
    }
    .logo { display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .logo-box {
      width: 34px; height: 24px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-box::after {
      content: '';
      border-style: solid;
      border-width: 6px 0 6px 12px;
      border-color: transparent transparent transparent #fff;
      margin-left: 2px;
    }
    .logo-text { font-size: var(--font-xl); font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .hdr-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer;
      color: var(--text); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }
    .icon-btn:active { background: var(--surface2); }

    #search-bar {
      display: none;
      height: var(--header-h);
      align-items: center;
      gap: 6px;
      padding: 0 8px;
    }
    #search-bar.open { display: flex; }
    #search-bar ~ #header-inner { display: none; }
    #search-input {
      flex: 1; height: 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text); font-size: var(--font-base); padding: 0 16px; outline: none;
    }
    #search-input::placeholder { color: var(--text2); }

    #main { flex: 1; overflow: hidden; position: relative; }
    .view {
      position: absolute; inset: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      display: none;
      padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
    }
    .view.active { display: block; }

    .chips {
      display: flex; gap: 8px;
      padding: 10px 12px 6px;
      overflow-x: auto; scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      height: 32px; padding: 0 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: var(--font-sm); font-weight: 500;
      cursor: pointer; white-space: nowrap;
    }
    .chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }

    .video-list { padding: 4px 0; }
    .vcard { cursor: pointer; padding: 8px 0; }
    .vcard:active { opacity: .65; }
    .vthumb-wrap { width: 100%; aspect-ratio: 16/9; background: var(--surface2); overflow: hidden; position: relative; }
    .vthumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .vdur {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,.85); color: #fff;
      font-size: var(--font-xs); font-weight: 600;
      padding: 2px 5px; border-radius: 4px;
    }
    .vinfo { display: flex; gap: 10px; padding: 8px 12px 2px; }
    .vchan-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 50%; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: var(--text2);
      overflow: hidden;
    }
    .vchan-icon img { width: 100%; height: 100%; object-fit: cover; }
    .vmeta { flex: 1; min-width: 0; }
    .vtitle {
      font-size: var(--font-base); font-weight: 600; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 3px;
    }
    .vsub { font-size: var(--font-sm); color: var(--text2); line-height: 1.4; }
    .vmore { width: 28px; height: 28px; flex-shrink: 0; background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }

    #player-view { background: var(--bg); }
    .player-topbar {
      position: sticky; top: 0; z-index: 10;
      height: 48px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 6px; gap: 4px;
    }
    .player-topbar-title { font-size: var(--font-md); font-weight: 600; }
    .pip-btn { width: 40px; height: 40px; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; padding: 0; }
    .pip-btn:active { background: var(--surface2); }
    .player-frame-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
    .player-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .player-info { padding: 12px 14px; }
    .player-title { font-size: var(--font-lg); font-weight: 700; line-height: 1.35; margin-bottom: 6px; }
    .player-stats { font-size: var(--font-sm); color: var(--text2); margin-bottom: 12px; }
    .player-channel-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); }
    .player-chan-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--text2); flex-shrink: 0; }
    .player-chan-name { font-size: var(--font-base); font-weight: 600; flex: 1; }
    .sub-btn { height: 34px; padding: 0 14px; background: var(--text); color: var(--bg); border: none; border-radius: 18px; font-size: var(--font-sm); font-weight: 700; cursor: pointer; }
    .related-heading { font-size: var(--font-md); font-weight: 700; padding: 12px 14px 4px; }

    .settings-wrap { padding: 20px 16px; }
    .settings-h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .settings-desc { font-size: var(--font-base); color: var(--text2); line-height: 1.55; margin-bottom: 20px; }
    .form-label { font-size: var(--font-sm); color: var(--text2); margin-bottom: 6px; display: block; }
    .form-input { width: 100%; height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: var(--font-base); padding: 0 14px; outline: none; margin-bottom: 12px; }
    .form-input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; height: 44px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: var(--font-md); font-weight: 700; cursor: pointer; margin-bottom: 10px; }
    .btn-secondary { width: 100%; height: 44px; background: var(--surface2); color: var(--text); border: none; border-radius: 10px; font-size: var(--font-md); font-weight: 600; cursor: pointer; margin-bottom: 10px; }
    .status-badge { padding: 9px 12px; border-radius: 9px; font-size: var(--font-sm); line-height: 1.4; margin-bottom: 16px; }
    .status-ok { background: rgba(0,200,80,.1); border: 1px solid rgba(0,200,80,.3); color: #4ade80; }
    .status-warn { background: rgba(255,165,0,.1); border: 1px solid rgba(255,165,0,.3); color: #fbbf24; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .hist-wrap { padding: 6px 16px; }
    .hist-title { font-size: var(--font-sm); font-weight: 600; color: var(--text2); padding: 8px 0 4px; }
    .hist-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: var(--font-base); }
    .hist-item:active { opacity: .65; }

    #tab-bar {
      flex-shrink: 0;
      height: calc(var(--tab-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex; z-index: 200;
    }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; color: var(--text2); cursor: pointer; }
    .tab.on { color: var(--text); }
    .tab-label { font-size: var(--font-xs); font-weight: 500; }

    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 20px; gap: 14px; color: var(--text2); font-size: var(--font-sm); }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 30px; gap: 12px; text-align: center; }
    .empty-icon { font-size: 46px; }
    .empty-h { font-size: 18px; font-weight: 700; }
    .empty-p { font-size: var(--font-sm); color: var(--text2); line-height: 1.5; }
    .errmsg { margin: 14px; padding: 12px 14px; background: rgba(255,0,0,.08); border: 1px solid rgba(255,0,0,.25); border-radius: 10px; font-size: var(--font-sm); color: #f87171; line-height: 1.45; }

    @media (min-width: 600px) {
      :root {
        --font-xs: 11px;
        --font-sm: 13px;
        --font-base: 15px;
        --font-md: 16px;
        --font-lg: 17px;
        --font-xl: 21px;
        --header-h: 64px;
        --tab-h: 64px;
      }
      #header-inner { padding: 0 20px; }
      .vinfo { padding: 10px 14px 3px; }
      .vchan-icon { width: 44px; height: 44px; }
      .settings-wrap { padding: 28px 24px; }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="search-bar">
      <button class="icon-btn" id="search-back-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>

      <button class="icon-btn" id="search-go-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div id="header-inner">
      <div class="logo">
        <div class="logo-box"></div>
        <span class="logo-text">YouTube</span>
      </div>
      <div class="hdr-actions">
        <button class="icon-btn" id="open-search-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      </div>

  <div id="main">

        <button class="chip" data-cat="25">ニュース</button>
        <button class="chip" data-cat="17">スポーツ</button>
        <button class="chip" data-cat="24">エンタメ</button>

      <div class="video-list" id="home-list"><div class="loading"><div class="spinner"></div><span>読み込み中...</span></div></div>
    </div>

    <div id="search-view" class="view">
      <div id="search-results"></div>
    </div>

    <div id="subscriptions-view" class="view">
      <div class="chips" id="sub-chips"></div>
      <div class="video-list" id="subscriptions-list"></div>
    </div>

    <div id="player-view" class="view">
      <div class="player-topbar">
        <button class="icon-btn" id="player-back-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        </button>
        <span class="player-topbar-title">動画</span>
        <div style="flex:1;"></div>
        <button class="pip-btn" id="pip-btn" title="ピクチャインピクチャ">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><path d="M10 17v4M14 17v4"/></svg>
        </button>
      </div>
      <div class="player-frame-wrap" id="player-frame-wrap">
        <div id="player-frame"></div>
      </div>
      <div class="player-info" id="player-info"></div>

    <div id="settings-view" class="view">

        <div class="divider"></div>

        <div style="font-size: var(--font-sm); color: var(--text2); line-height: 1.6;">
          <p style="margin-bottom: 8px;"><b>📱 iPhoneで使う:</b> 共有ボタン → ホーム画面に追加</p>

  <nav id="tab-bar">
    <button class="tab on" data-tab="home">

    <button class="tab" data-tab="search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="tab-label">検索</span>
    </button>
    <button class="tab" data-tab="subscriptions">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><polyline points="10 8 10 14 15 11"/></svg>

      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('✅ SW registered'))
    .catch(err => console.error('❌ SW failed:', err));
}

const API = 'https://www.googleapis.com/youtube/v3';

let authState = {
  apiKey: localStorage.getItem('yt_api_key') || '',
  youtubeToken: sessionStorage.getItem('yt_oauth_token') || '',
  userName: null,
};

let uiState = {
  currentTab: 'home',
  currentCat: '',
  prevTab: 'home',
  homeNext: '',
  searchNext: '',
  currentSearch: '',
  currentVid: null,
  busy: false,
  inPiP: false,
  searchHistory: JSON.parse(localStorage.getItem('yt_hist') || '[]'),
  pipListenerAttached: false,
  subscriptions: [],
  selectedChannel: null,
};

// ──────────────────── API ────────────────────
async function api(endpoint, params, useYoutube = false) {
  const url = new URL(`${API}/${endpoint}`);

  const token = useYoutube ? authState.youtubeToken : authState.apiKey;
  if (!token) throw new Error('認証が必要です');

  if (useYoutube && authState.youtubeToken) {
    url.searchParams.set('access_token', authState.youtubeToken);
  } else {
    url.searchParams.set('key', authState.apiKey);
  }

  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
  });

  const res = await fetch(url.toString());
  const json = await res.json();
  if (!res.ok) throw new Error(json?.error?.message || `HTTP ${res.status}`);
  return json;
}

function fmtViews(n) { n = parseInt(n) || 0; if (n >= 1e8) return `${(n/1e8).toFixed(0)}億`; if (n >= 1e4) return `${Math.floor(n/1e4)}万`; return n; }
function fmtDate(iso) { if (!iso) return ''; const s = (Date.now() - new Date(iso)) / 1000; if (s < 3600) return `${Math.floor(s/60)}分前`; if (s < 86400) return `${Math.floor(s/3600)}時間前`; if (s < 2592000) return `${Math.floor(s/86400)}日前`; return `${Math.floor(s/2592000)}ヶ月前`; }
function fmtDur(iso) { if (!iso) return ''; const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/); if (!m) return ''; const h = +(m[1]||0), min = +(m[2]||0), s = +(m[3]||0); if (h) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`; return `${min}:${String(s).padStart(2,'0')}`; }
function bestThumb(t) { return (t?.maxres || t?.high || t?.medium || t?.default)?.url || ''; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ──────────────────── HOME ────────────────────
async function loadHome(append = false) {
  if (uiState.busy && append) return;
  uiState.busy = true;

  if (!authState.apiKey) {
    document.getElementById('home-list').innerHTML = '<div class="empty"><div class="empty-icon">🔑</div><div class="empty-h">APIキーが必要</div></div>';
    uiState.busy = false;
    return;
  }

  if (!append) {
    uiState.homeNext = '';
    document.getElementById('home-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  } else {
    addSpinner('home-list');
  }

  try {
    const data = await api('videos', {
      part: 'snippet,statistics,contentDetails',
      chart: 'mostPopular',
      regionCode: 'JP',
      maxResults: 20,
      videoCategoryId: uiState.currentCat || undefined,
      pageToken: uiState.homeNext || undefined,
    });
    uiState.homeNext = data.nextPageToken || '';
    renderCards('home-list', data.items, append);
  } catch(e) {
    console.error('loadHome error:', e);
    document.getElementById('home-list').innerHTML = `<div class="errmsg">⚠️ ${esc(e.message)}</div>`;
  }
  uiState.busy = false;
}

// ──────────────────── SEARCH ────────────────────
function openSearch() {
  document.getElementById('header-inner').style.display = 'none';
  document.getElementById('search-bar').classList.add('open');
  document.getElementById('search-input').focus();
  if (!uiState.currentSearch) showHistory();
  switchTab('search', true);
}

function closeSearch() {
  document.getElementById('search-bar').classList.remove('open');
  document.getElementById('header-inner').style.display = '';
  switchTab(uiState.currentTab === 'search' ? 'home' : uiState.currentTab);
}

function doSearchFromInput() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  addHistory(q);
  document.getElementById('search-bar').classList.remove('open');
  document.getElementById('header-inner').style.display = '';
  uiState.currentSearch = q;
  uiState.searchNext = '';
  switchTab('search');
  runSearch(q);
}

async function runSearch(q, append = false) {
  if (!authState.apiKey) {
    document.getElementById('search-results').innerHTML = '<div class="empty"><div class="empty-icon">🔑</div><div class="empty-h">APIキーが必要</div></div>';
    return;
  }
  if (uiState.busy && append) return;
  uiState.busy = true;

  if (!append) {
    document.getElementById('search-results').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  } else {
    addSpinner('search-results');
  }

  try {
    const searchRes = await api('search', {
      part: 'snippet',
      q,
      type: 'video',
      regionCode: 'JP',
      maxResults: 20,
      pageToken: uiState.searchNext || undefined,
    });
    uiState.searchNext = searchRes.nextPageToken || '';
    const ids = searchRes.items.map(i => i.id.videoId).filter(Boolean).join(',');

    if (!ids) {
      if (!append) document.getElementById('search-results').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-h">見つかりません</div></div>';
      uiState.busy = false;
      return;
    }

    const detail = await api('videos', { part: 'snippet,statistics,contentDetails', id: ids });
    renderCards('search-results', detail.items, append);
  } catch(e) {
    console.error('runSearch error:', e);
    document.getElementById('search-results').innerHTML = `<div class="errmsg">⚠️ ${esc(e.message)}</div>`;
  }
  uiState.busy = false;
}

function addHistory(q) {
  uiState.searchHistory = [q, ...uiState.searchHistory.filter(x => x !== q)].slice(0, 12);
  localStorage.setItem('yt_hist', JSON.stringify(uiState.searchHistory));
}

function showHistory() {
  const el = document.getElementById('search-results');
  if (!uiState.searchHistory.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="hist-wrap">
    <div class="hist-title">最近の検索</div>
    ${uiState.searchHistory.map(q => `
      <div class="hist-item" onclick="histClick(${JSON.stringify(q)})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--text2)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>${esc(q)}</span>
      </div>`).join('')}
  </div>`;
}

function histClick(q) {
  document.getElementById('search-input').value = q;
  doSearchFromInput();
}

// ──────────────────── PLAYER ────────────────────
function playVideo(id, title, channel, views, published, thumb) {
  uiState.currentVid = id;
  uiState.prevTab = uiState.currentTab;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('player-view').classList.add('active');
  document.getElementById('player-view').scrollTop = 0;

  document.getElementById('player-frame').innerHTML = `<iframe
    src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
  ></iframe>`;

  document.getElementById('player-info').innerHTML = `
    <div class="player-title">${esc(title)}</div>
    <div class="player-stats">${views ? fmtViews(views) : ''}${views && published ? ' ・ ' : ''}${fmtDate(published)}</div>
    <div class="player-channel-row">
      <div class="player-chan-icon">${(channel||'?')[0].toUpperCase()}</div>
      <div class="player-chan-name">${esc(channel)}</div>
      <button class="sub-btn">チャンネル登録</button>
    </div>`;

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title,
      artist: channel,
      artwork: thumb ? [{src: thumb, sizes: '512x512', type: 'image/jpeg'}] : [],
    });
  }

  document.getElementById('related-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  loadRelated(id, title);
}

async function loadRelated(id, title) {
  if (!authState.apiKey) { document.getElementById('related-list').innerHTML = ''; return; }
  try {
    const words = (title||'').replace(/[【】「」『』()（）\[\]]/g,' ').trim().slice(0, 30);
    const sr = await api('search', { part: 'snippet', q: words, type: 'video', maxResults: 10 });
    const ids = sr.items.map(i => i.id.videoId).filter(x => x && x !== id).join(',');
    if (!ids) { document.getElementById('related-list').innerHTML = ''; return; }
    const d = await api('videos', { part: 'snippet,statistics,contentDetails', id: ids });
    renderCards('related-list', d.items, false);
  } catch(e) {
    console.error('loadRelated error:', e);
    document.getElementById('related-list').innerHTML = '';
  }
}

function closePlayer() {
  // BUG FIX: 全画面終了後も再生を続ける
  const frame = document.getElementById('player-frame');
  const iframe = frame.querySelector('iframe');

  if (iframe) {
    // src を再設定して一旦停止させつつ、iframe自体は残す
    // ユーザーが戻ってきた場合のために状態保持
  }

  frame.innerHTML = '';
  uiState.currentVid = null;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`${uiState.prevTab}-view`).classList.add('active');
}

// ──────────────────── PiP (BUG FIX) ────────────────────
function setupPiPAutoScroll() {
  // BUG FIX: 重複リスナー防止
  if (uiState.pipListenerAttached) return;

  const playerView = document.getElementById('player-view');
  playerView.addEventListener('scroll', () => {
    // 手動ボタンのみで動作するのでここは何もしない
  }, { passive: true });

  uiState.pipListenerAttached = true;
}

async function enterPiP() {
  // BUG FIX: 手動PiPボタンのみ
  try {
    const iframe = document.querySelector('#player-frame iframe');
    if (iframe && document.pictureInPictureEnabled) {
      // iframeはPiP非対応なので、YouTubeの制御を促す
      uiState.inPiP = true;
      alert('YouTube の制御パネルでピクチャインピクチャを有効にしてください');
      uiState.inPiP = false;
    }
  } catch(err) {
    console.error('PiP error:', err);
  }
}

// ──────────────────── SUBSCRIPTIONS ────────────────────
function initGoogleSignIn() {
  if (typeof google === 'undefined') {
    console.error('Google API not loaded');
    return;
  }

  google.accounts.id.initialize({
    client_id: '773479629029-j0uf9g5nkct5l5jjs87i0b9jnknt2iql.apps.googleusercontent.com',
    callback: handleGoogleSignIn,
  });

  google.accounts.id.renderButton(
    document.getElementById('oauth-section'),
    {
      theme: 'dark',
      size: 'large',
      text: 'signin_with',
    }
  );
}

function handleGoogleSignIn(response) {
  const base64Url = response.credential.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map((c) => {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  const decoded = JSON.parse(jsonPayload);

  sessionStorage.setItem('yt_oauth_token', response.credential);
  authState.youtubeToken = response.credential;
  authState.userName = decoded.name;

  updateAuthUI();
  loadSubscriptions();
}

async function loadSubscriptions() {
  if (!authState.youtubeToken) return;

  try {
    const subs = await api('subscriptions', {
      part: 'snippet',
      mine: true,
      maxResults: 50,
    }, true);

    uiState.subscriptions = subs.items || [];
    renderSubscriptionChips();
  } catch(e) {
    console.error('Load subscriptions error:', e);
  }
}

function renderSubscriptionChips() {
  const chipsEl = document.getElementById('sub-chips');
  if (!uiState.subscriptions.length) {
    chipsEl.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text2);">チャンネルが見つかりません</div>';
    return;
  }

  chipsEl.innerHTML = uiState.subscriptions.map((sub, i) => `
    <button class="chip ${i === 0 ? 'on' : ''}" onclick="loadChannelVideos(${i}, '${sub.snippet.resourceId.channelId}')">
      ${esc(sub.snippet.title)}
    </button>
  `).join('');

  if (uiState.subscriptions.length > 0) {
    uiState.selectedChannel = 0;
    loadChannelVideos(0, uiState.subscriptions[0].snippet.resourceId.channelId);
  }
}

async function loadChannelVideos(index, channelId) {
  document.querySelectorAll('#sub-chips .chip').forEach((c, i) => c.classList.toggle('on', i === index));
  uiState.selectedChannel = index;

  document.getElementById('subscriptions-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const search = await api('search', {
      part: 'snippet',
      channelId: channelId,
      type: 'video',
      maxResults: 20,
      order: 'date',
    });

    const ids = search.items.map(i => i.id.videoId).filter(Boolean).join(',');
    if (!ids) {
      document.getElementById('subscriptions-list').innerHTML = '<div class="empty"><div class="empty-icon">📭</div></div>';
      return;
    }

    const videos = await api('videos', { part: 'snippet,statistics,contentDetails', id: ids });
    renderCards('subscriptions-list', videos.items, false);
  } catch(e) {
    console.error('loadChannelVideos error:', e);
    document.getElementById('subscriptions-list').innerHTML = `<div class="errmsg">⚠️ ${esc(e.message)}</div>`;
  }
}

// ──────────────────── RENDER ────────────────────
function renderCards(containerId, items, append) {
  const el = document.getElementById(containerId);

  if (!items?.length) {
    if (!append) el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div></div>';
    removeSpinner(containerId);
    return;
  }

  const html = items.map(item => {
    const s = item.snippet;
    const st = item.statistics;
    const dur = fmtDur(item.contentDetails?.duration);
    const thumb = bestThumb(s.thumbnails);
    const initial = (s.channelTitle||'?')[0].toUpperCase();
    return `<div class="vcard"
      data-id="${esc(item.id)}"
      data-title="${esc(s.title)}"
      data-channel="${esc(s.channelTitle)}"
      data-views="${st?.viewCount||''}"
      data-pub="${s.publishedAt||''}"
      data-thumb="${thumb}"
      onclick="onCard(this)">
      <div class="vthumb-wrap">
        <img class="vthumb" src="${thumb}" loading="lazy" />
        ${dur ? `<span class="vdur">${dur}</span>` : ''}
      </div>
      <div class="vinfo">
        <div class="vchan-icon">${initial}</div>
        <div class="vmeta">
          <div class="vtitle">${esc(s.title)}</div>
          <div class="vsub">${esc(s.channelTitle)}${st?.viewCount ? ` · ${fmtViews(st.viewCount)}` : ''}${s.publishedAt ? ` · ${fmtDate(s.publishedAt)}` : ''}</div>
        </div>
        <button class="vmore" onclick="event.stopPropagation()">⋮</button>
      </div>
    </div>`;
  }).join('');

  removeSpinner(containerId);

  if (append) {
    el.insertAdjacentHTML('beforeend', html);
  } else {
    el.innerHTML = html;
  }
}

function onCard(el) {
  playVideo(el.dataset.id, el.dataset.title, el.dataset.channel, el.dataset.views, el.dataset.pub, el.dataset.thumb);
}

function addSpinner(id) {
  const d = document.createElement('div');
  d.id = `sp-${id}`; d.className = 'loading';
  d.innerHTML = '<div class="spinner"></div>';
  document.getElementById(id).appendChild(d);
}

function removeSpinner(id) {
  document.getElementById(`sp-${id}`)?.remove();
}

function updateAuthUI() {
  const statusEl = document.getElementById('auth-status');
  if (authState.youtubeToken) {
    statusEl.innerHTML = `<div class="status-badge status-ok">✅ YouTubeでログイン済み (${authState.userName})</div>`;
  } else if (authState.apiKey) {
    statusEl.innerHTML = '<div class="status-badge status-ok">✅ APIキー設定済み</div>';
  } else {
    statusEl.innerHTML = '<div class="status-badge status-warn">⚠️ 認証が必要です</div>';
  }
}

function switchTab(tab, silent = false) {
  if (uiState.currentVid) closePlayer();
  uiState.currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`${tab}-view`).classList.add('active');
  if (!silent && tab === 'search' && !uiState.currentSearch) showHistory();
}

function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) { alert('APIキーを入力してください'); return; }
  authState.apiKey = k;
  localStorage.setItem('yt_api_key', k);
  updateAuthUI();
  switchTab('home');
  loadHome();
}

function clearKey() {
  authState.apiKey = '';
  localStorage.removeItem('yt_api_key');
  document.getElementById('api-key-input').value = '';
  updateAuthUI();
  document.getElementById('home-list').innerHTML = '<div class="empty"><div class="empty-icon">🔑</div></div>';
}

// ──────────────────── INIT ────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('api-key-input').value = authState.apiKey;
  updateAuthUI();
  initGoogleSignIn();

  // Tabs
  document.getElementById('tab-bar').addEventListener('click', e => {
    const btn = e.target.closest('[data-tab]');
    if (btn) switchTab(btn.dataset.tab);
  });

  // Chips
  document.getElementById('chips').addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('#chips .chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    uiState.currentCat = chip.dataset.cat;
    loadHome();
  });

  // Search
  document.getElementById('open-search-btn').addEventListener('click', openSearch);
  document.getElementById('search-back-btn').addEventListener('click', closeSearch);
  document.getElementById('search-go-btn').addEventListener('click', doSearchFromInput);
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearchFromInput();
  });

  // Player
  document.getElementById('player-back-btn').addEventListener('click', closePlayer);
  document.getElementById('pip-btn').addEventListener('click', enterPiP);

  // Settings
  document.getElementById('save-key-btn').addEventListener('click', saveKey);
  document.getElementById('clear-key-btn').addEventListener('click', clearKey);

  // Infinite scroll
  document.getElementById('home-view').addEventListener('scroll', () => {
    const el = document.getElementById('home-view');
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 400 && uiState.homeNext && !uiState.busy) {
      loadHome(true);
    }
  });

  document.getElementById('search-view').addEventListener('scroll', () => {
    const el = document.getElementById('search-view');
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 400 && uiState.searchNext && !uiState.busy && uiState.currentSearch) {
      runSearch(uiState.currentSearch, true);
    }
  });

  loadHome();
});
</script>
